 version: '3.8'

services:
  vu-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vu-chatbot-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - AWS_S3_BUCKET=vu-chatbot
      - AWS_REGION=us-east-1
      - AWS_S3_PREFIX=vu-chatbot-db
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - CORS_ORIGINS=*
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vu-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: vu-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    depends_on:
      vu-chatbot:
        condition: service_healthy
    networks:
      - vu-network

networks:
  vu-network:
    driver: bridge

volumes:
  app_data:
    driver: local
